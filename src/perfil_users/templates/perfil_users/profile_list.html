{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Perfis</h2>
    <a href="{% url 'profile_create' %}" class="btn btn-primary mb-3">Criar Novo Perfil</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Usuário</th>
                <th>Posição</th>
                <th>Data de Nascimento</th>
                <th>Descrição</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for profile in profiles %}
            <tr>
                <td>{{ profile.username }}</td>
                <td>{{ profile.position }}</td>
                <td>{{ profile.birth }}</td>
                <td>{{ profile.description }}</td>
                <td>
                    <a href="{% url 'profile_update' profile.id %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'profile_delete' profile.id %}" class="btn btn-danger btn-sm">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
